<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HNG Todo Card</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

  <main class="w-full max-w-md">

    <article data-testid="test-todo-card"
      class="bg-white rounded-xl shadow-lg p-6 space-y-4">

      <!-- CONTENT -->
      <div class="task-content space-y-2">

        <div class="flex items-center gap-3">

          <label class="flex items-center gap-3 cursor-pointer">

            <input 
              type="checkbox"
              data-testid="test-todo-complete-toggle"
              aria-label="Mark task as complete"
              class="task-checkbox opacity-0 absolute"
            />

            <div class="w-6 h-6 border-2 border-gray-400 rounded-md flex items-center justify-center">
              <span class="checkmark hidden">✓</span>
            </div>

          </label>

          <span data-testid="test-todo-priority"
            class="text-xs px-2 py-1 rounded-full bg-red-100 text-red-600 font-semibold">
            High
          </span>

          <div class="ml-auto">

            <span data-testid="test-todo-status"
              class="task-status text-xs font-medium">
              Pending
            </span>

          </div>

        </div>

        <h2 data-testid="test-todo-title"
          class="task-title text-xl font-bold text-gray-800">
          Finish Project Proposal
        </h2>

        <p data-testid="test-todo-description"
          class="text-gray-600 text-sm">
          Review the final draft and send it to the client for approval.
        </p>

        <p class="text-sm text-gray-500">
          📅 <time data-testid="test-todo-due-date" datetime="2026-03-01">
            Due March 1, 2026
          </time>
        </p>

        <p class="text-sm text-blue-600 font-medium">
          ⏳ <span data-testid="test-todo-time-remaining">
            Due in 3 days
          </span>
        </p>

        <!-- TAGS -->
        <ul data-testid="test-todo-tags" class="flex gap-2 flex-wrap">
          <li class="text-xs bg-gray-200 px-2 py-1 rounded-full">work</li>
          <li class="text-xs bg-gray-200 px-2 py-1 rounded-full">urgent</li>
        </ul>

        <!-- ACTIONS -->
        <div class="flex justify-end gap-2 pt-3">

          <button data-testid="test-todo-edit-button"
            class="px-3 py-1 text-sm bg-blue-100 text-blue-600 rounded-lg"
            onclick="console.log('edit clicked')">
            Edit
          </button>

          <button data-testid="test-todo-delete-button"
            class="px-3 py-1 text-sm bg-red-100 text-red-600 rounded-lg"
            onclick="alert('Delete clicked')">
            Delete
          </button>

        </div>

      </div>

    </article>

  </main>

  <script src="script.js"></script>

</body>
</html>
